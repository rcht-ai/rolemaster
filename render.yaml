# Render Blueprint — one-click deploy from the GitHub UI.
#
# How to use:
#   1. Push this repo to GitHub (already done).
#   2. Sign in at https://dashboard.render.com.
#   3. Click "New" → "Blueprint" → connect this repo.
#   4. Render reads this file and provisions everything.
#   5. (Optional) In the service's Environment tab, set ANTHROPIC_API_KEY
#      for real Claude Copilot — leave unset to use the keyword fallback.
#
# Free tier note: persistent disks require a paid plan ($7/mo). On free, the
# SQLite DB and uploaded files reset every time the service redeploys or sleeps.
# That's fine for a demo. To add persistence later, change `plan: free` to
# `plan: starter` and uncomment the `disk:` block below.

services:
  - type: web
    name: rolemaster
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false   # Set in the Render UI — never commit secrets
    # disk:           # Uncomment with `plan: starter` for persistent SQLite + uploads
    #   name: rolemaster-data
    #   mountPath: /data
    #   sizeGB: 1
