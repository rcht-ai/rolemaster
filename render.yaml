# Render Blueprint — one-click deploy.
#
# To use:
#   1. Push this repo to GitHub (already done)
#   2. Go to https://dashboard.render.com/blueprints → New Blueprint Instance
#   3. Connect your GitHub repo → Render reads this file and provisions everything
#   4. Optional: in the Render UI, set ANTHROPIC_API_KEY for real Copilot
#
# Note: persistent disks are a paid feature on Render. Without one the SQLite DB
# resets every redeploy. For free-tier demos that's fine; for real persistence,
# upgrade the service to Starter ($7/mo) and the disk block below activates.

services:
  - type: web
    name: rolemaster
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: UPLOAD_DIR
        value: /uploads
      - key: ANTHROPIC_API_KEY
        sync: false  # Set this in the Render UI (don't commit secrets)
    disk:
      name: rolemaster-data
      mountPath: /data
      sizeGB: 1
